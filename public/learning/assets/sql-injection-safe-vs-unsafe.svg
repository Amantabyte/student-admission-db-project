<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">SQL Injection Safe vs Unsafe</title>
  <desc id="desc">Unsafe string concatenation compared with safe parameterized SQL.</desc>
  <rect width="1200" height="560" rx="34" fill="#f8fafc"/>
  <text x="600" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#17352f">SQL Injection: Unsafe vs Safe</text>
  <g font-family="Verdana, sans-serif">
    <rect x="70" y="105" width="500" height="360" rx="28" fill="#fff1f2" stroke="#be123c" stroke-width="4"/>
    <text x="320" y="150" text-anchor="middle" font-size="27" font-weight="700" fill="#be123c">Unsafe</text>
    <text x="105" y="205" font-size="18" fill="#64121f">User input is joined into SQL text.</text>
    <rect x="105" y="235" width="430" height="90" rx="16" fill="#ffffff"/>
    <text x="125" y="270" font-size="16" fill="#17211b">"SELECT * FROM students WHERE</text>
    <text x="125" y="300" font-size="16" fill="#17211b">admission_number = '" + input + "'"</text>
    <text x="105" y="370" font-size="18" font-weight="700" fill="#be123c">Risk: input can change the query meaning.</text>
    <rect x="630" y="105" width="500" height="360" rx="28" fill="#ecfdf5" stroke="#047857" stroke-width="4"/>
    <text x="880" y="150" text-anchor="middle" font-size="27" font-weight="700" fill="#047857">Safe</text>
    <text x="665" y="205" font-size="18" fill="#123c35">SQL text and values are separate.</text>
    <rect x="665" y="235" width="430" height="120" rx="16" fill="#ffffff"/>
    <text x="685" y="270" font-size="16" fill="#17211b">"SELECT * FROM students WHERE</text>
    <text x="685" y="300" font-size="16" fill="#17211b">admission_number = $1"</text>
    <text x="685" y="330" font-size="16" fill="#17211b">[input]</text>
    <text x="665" y="400" font-size="18" font-weight="700" fill="#047857">PostgreSQL treats input as data, not code.</text>
    <text x="600" y="515" text-anchor="middle" font-size="22" font-weight="700" fill="#17352f">Constraints protect data quality. Parameterized queries protect query execution.</text>
  </g>
</svg>
