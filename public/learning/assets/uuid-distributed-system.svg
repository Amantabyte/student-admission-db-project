<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">UUID Distributed System</title>
  <desc id="desc">Three servers independently generate UUIDs and insert into one database without collisions.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#17352f"/>
    </marker>
  </defs>
  <rect width="1200" height="520" rx="34" fill="#f7fbf4"/>
  <text x="600" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#17352f">Why UUID Helps Distributed Systems</text>
  <g font-family="Verdana, sans-serif" font-size="17">
    <rect x="80" y="115" width="250" height="90" rx="20" fill="#ffffff" stroke="#0f766e" stroke-width="4"/>
    <text x="205" y="150" text-anchor="middle" font-size="22" font-weight="700" fill="#0f766e">Backend A</text>
    <text x="205" y="180" text-anchor="middle">generates UUID A</text>
    <rect x="80" y="235" width="250" height="90" rx="20" fill="#ffffff" stroke="#0f766e" stroke-width="4"/>
    <text x="205" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#0f766e">Backend B</text>
    <text x="205" y="300" text-anchor="middle">generates UUID B</text>
    <rect x="80" y="355" width="250" height="90" rx="20" fill="#ffffff" stroke="#0f766e" stroke-width="4"/>
    <text x="205" y="390" text-anchor="middle" font-size="22" font-weight="700" fill="#0f766e">Backend C</text>
    <text x="205" y="420" text-anchor="middle">generates UUID C</text>
    <line x1="330" y1="160" x2="705" y2="260" stroke="#17352f" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="330" y1="280" x2="705" y2="280" stroke="#17352f" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="330" y1="400" x2="705" y2="300" stroke="#17352f" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="720" y="145" width="360" height="260" rx="28" fill="#ffffff" stroke="#2563eb" stroke-width="4"/>
    <text x="900" y="190" text-anchor="middle" font-size="26" font-weight="700" fill="#1d4ed8">PostgreSQL</text>
    <text x="900" y="235" text-anchor="middle">students.id UUID PRIMARY KEY</text>
    <text x="900" y="275" text-anchor="middle">No central counter required</text>
    <text x="900" y="315" text-anchor="middle">Extremely low collision risk</text>
    <text x="900" y="355" text-anchor="middle">Good for public APIs</text>
    <text x="600" y="485" text-anchor="middle" font-size="20" font-weight="700" fill="#17352f">SERIAL asks the database for the next number. UUID can be generated independently.</text>
  </g>
</svg>
