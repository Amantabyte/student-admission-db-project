<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Entity Relationship Diagram</title>
  <desc id="desc">ERD showing students, courses, applications, and documents with one to many relationships.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#17352f"/>
    </marker>
  </defs>
  <rect width="1200" height="720" rx="36" fill="#fbf7ed"/>
  <text x="600" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#17352f">Student Admission ERD</text>
  <g font-family="Verdana, sans-serif" font-size="17">
    <rect x="75" y="110" width="285" height="230" rx="22" fill="#ffffff" stroke="#0f766e" stroke-width="4"/>
    <text x="218" y="150" text-anchor="middle" font-size="25" font-weight="700" fill="#0f766e">students</text>
    <text x="105" y="190">id PK UUID</text>
    <text x="105" y="225">admission_number UNIQUE</text>
    <text x="105" y="260">name NOT NULL</text>
    <text x="105" y="295">email UNIQUE</text>
    <rect x="840" y="110" width="285" height="205" rx="22" fill="#ffffff" stroke="#d97706" stroke-width="4"/>
    <text x="983" y="150" text-anchor="middle" font-size="25" font-weight="700" fill="#b45309">courses</text>
    <text x="870" y="190">id PK UUID</text>
    <text x="870" y="225">name NOT NULL</text>
    <text x="870" y="260">code UNIQUE</text>
    <text x="870" y="295">duration_months CHECK</text>
    <rect x="455" y="390" width="310" height="245" rx="22" fill="#ffffff" stroke="#5d6adf" stroke-width="4"/>
    <text x="610" y="430" text-anchor="middle" font-size="25" font-weight="700" fill="#3844ac">applications</text>
    <text x="485" y="470">id PK UUID</text>
    <text x="485" y="505">student_id FK</text>
    <text x="485" y="540">course_id FK</text>
    <text x="485" y="575">status CHECK</text>
    <text x="485" y="610">UNIQUE(student_id, course_id)</text>
    <rect x="75" y="425" width="285" height="205" rx="22" fill="#ffffff" stroke="#2f7d32" stroke-width="4"/>
    <text x="218" y="465" text-anchor="middle" font-size="25" font-weight="700" fill="#2f7d32">documents</text>
    <text x="105" y="505">id PK UUID</text>
    <text x="105" y="540">student_id FK</text>
    <text x="105" y="575">file_name NOT NULL</text>
    <text x="105" y="610">file_url NOT NULL</text>
    <line x1="360" y1="250" x2="455" y2="505" stroke="#17352f" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="355" y="390" font-size="20" font-weight="700" fill="#17352f">1:N</text>
    <line x1="840" y1="245" x2="765" y2="540" stroke="#17352f" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="795" y="390" font-size="20" font-weight="700" fill="#17352f">1:N</text>
    <line x1="218" y1="340" x2="218" y2="425" stroke="#17352f" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="235" y="390" font-size="20" font-weight="700" fill="#17352f">1:N</text>
    <text x="600" y="690" text-anchor="middle" font-size="20" font-weight="700" fill="#17352f">applications connects students and courses, while documents belong to students.</text>
  </g>
</svg>
