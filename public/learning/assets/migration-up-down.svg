<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-labelledby="title desc">
  <title id="title">Migration Up Down Flow</title>
  <desc id="desc">Up scripts move database schema forward and down scripts roll it back.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#17352f"/>
    </marker>
  </defs>
  <rect width="1100" height="430" rx="34" fill="#fffaf0"/>
  <text x="550" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#17352f">Migration Up and Down Scripts</text>
  <g font-family="Verdana, sans-serif" font-size="19" text-anchor="middle">
    <rect x="70" y="135" width="250" height="120" rx="24" fill="#ffffff" stroke="#64748b" stroke-width="4"/>
    <text x="195" y="185" font-size="24" font-weight="700" fill="#334155">Current DB</text>
    <text x="195" y="220">old schema</text>
    <line x1="330" y1="195" x2="500" y2="195" stroke="#17352f" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="505" y="120" width="190" height="150" rx="24" fill="#e8fff7" stroke="#0f766e" stroke-width="4"/>
    <text x="600" y="175" font-size="24" font-weight="700" fill="#0f766e">up.sql</text>
    <text x="600" y="215">apply change</text>
    <line x1="700" y1="195" x2="865" y2="195" stroke="#17352f" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="875" y="135" width="180" height="120" rx="24" fill="#ffffff" stroke="#2563eb" stroke-width="4"/>
    <text x="965" y="185" font-size="24" font-weight="700" fill="#1d4ed8">New DB</text>
    <text x="965" y="220">new schema</text>
    <path d="M 900 295 C 725 380, 390 380, 205 295" fill="none" stroke="#b91c1c" stroke-width="5" marker-end="url(#arrow)"/>
    <text x="550" y="350" font-size="24" font-weight="700" fill="#b91c1c">down.sql rolls back the change</text>
  </g>
</svg>
