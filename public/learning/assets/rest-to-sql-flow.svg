<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-labelledby="title desc">
  <title id="title">REST to SQL Mapping</title>
  <desc id="desc">REST methods mapped to SQL DML commands.</desc>
  <rect width="1100" height="430" rx="34" fill="#f3fbff"/>
  <text x="550" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#17352f">CRUD, REST, and SQL Are the Same Story</text>
  <g font-family="Verdana, sans-serif" font-size="20" text-anchor="middle">
    <rect x="70" y="115" width="210" height="210" rx="24" fill="#ffffff" stroke="#0f766e" stroke-width="4"/>
    <text x="175" y="160" font-size="26" font-weight="700" fill="#0f766e">Create</text>
    <text x="175" y="210">POST</text>
    <text x="175" y="260">INSERT</text>
    <text x="175" y="300" font-size="15">/api/students</text>
    <rect x="320" y="115" width="210" height="210" rx="24" fill="#ffffff" stroke="#2563eb" stroke-width="4"/>
    <text x="425" y="160" font-size="26" font-weight="700" fill="#2563eb">Read</text>
    <text x="425" y="210">GET</text>
    <text x="425" y="260">SELECT</text>
    <text x="425" y="300" font-size="15">/api/students</text>
    <rect x="570" y="115" width="210" height="210" rx="24" fill="#ffffff" stroke="#d97706" stroke-width="4"/>
    <text x="675" y="160" font-size="26" font-weight="700" fill="#b45309">Update</text>
    <text x="675" y="210">PATCH / PUT</text>
    <text x="675" y="260">UPDATE</text>
    <text x="675" y="300" font-size="15">/api/students/:id</text>
    <rect x="820" y="115" width="210" height="210" rx="24" fill="#ffffff" stroke="#b91c1c" stroke-width="4"/>
    <text x="925" y="160" font-size="26" font-weight="700" fill="#b91c1c">Delete</text>
    <text x="925" y="210">DELETE</text>
    <text x="925" y="260">DELETE</text>
    <text x="925" y="300" font-size="15">/api/students/:id</text>
  </g>
</svg>
